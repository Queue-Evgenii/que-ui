<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>que-ui — Breadcrumb (JS)</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <header>
    <span class="logo">que-ui</span>
    <nav>
      <que-button href="breadcrumb.html" variant="ghost" size="sm">CSS</que-button>
      <que-button href="breadcrumb-js.html" size="sm">JS</que-button>
      <que-button href="all.html" variant="ghost" size="sm">All pages</que-button>
    </nav>
    <div class="theme-toggle">
      <div class="que-segmented que-segmented--pill" id="theme-toggle">
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="light" checked />
          <span class="que-segmented__label">Light</span>
        </label>
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="dark" />
          <span class="que-segmented__label">Dark</span>
        </label>
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="system" />
          <span class="que-segmented__label">System</span>
        </label>
      </div>
    </div>
  </header>

  <main>
    <h2>Chevron (default)</h2>
    <que-breadcrumb>
      <que-breadcrumb-item href="#">Home</que-breadcrumb-item>
      <que-breadcrumb-item href="#">Components</que-breadcrumb-item>
      <que-breadcrumb-item>Breadcrumb</que-breadcrumb-item>
    </que-breadcrumb>

    <h2>Slash</h2>
    <que-breadcrumb separator="slash">
      <que-breadcrumb-item href="#">Home</que-breadcrumb-item>
      <que-breadcrumb-item href="#">Dashboard</que-breadcrumb-item>
      <que-breadcrumb-item href="#">Settings</que-breadcrumb-item>
      <que-breadcrumb-item>Profile</que-breadcrumb-item>
    </que-breadcrumb>

    <h2>Dot</h2>
    <que-breadcrumb separator="dot">
      <que-breadcrumb-item href="#">Store</que-breadcrumb-item>
      <que-breadcrumb-item href="#">Electronics</que-breadcrumb-item>
      <que-breadcrumb-item>Laptops</que-breadcrumb-item>
    </que-breadcrumb>

    <h2>Custom separator</h2>
    <div class="col" style="gap:10px;">
      <que-breadcrumb separator="→">
        <que-breadcrumb-item href="#">Home</que-breadcrumb-item>
        <que-breadcrumb-item href="#">Blog</que-breadcrumb-item>
        <que-breadcrumb-item>Post</que-breadcrumb-item>
      </que-breadcrumb>
      <que-breadcrumb separator="›">
        <que-breadcrumb-item href="#">Home</que-breadcrumb-item>
        <que-breadcrumb-item href="#">Docs</que-breadcrumb-item>
        <que-breadcrumb-item>API</que-breadcrumb-item>
      </que-breadcrumb>
      <que-breadcrumb separator="|">
        <que-breadcrumb-item href="#">Home</que-breadcrumb-item>
        <que-breadcrumb-item href="#">Products</que-breadcrumb-item>
        <que-breadcrumb-item>Detail</que-breadcrumb-item>
      </que-breadcrumb>
    </div>

    <h2>Sizes</h2>
    <div class="col" style="gap:12px;">
      <que-breadcrumb size="sm">
        <que-breadcrumb-item href="#">Home</que-breadcrumb-item>
        <que-breadcrumb-item href="#">Section</que-breadcrumb-item>
        <que-breadcrumb-item>Page (sm)</que-breadcrumb-item>
      </que-breadcrumb>
      <que-breadcrumb>
        <que-breadcrumb-item href="#">Home</que-breadcrumb-item>
        <que-breadcrumb-item href="#">Section</que-breadcrumb-item>
        <que-breadcrumb-item>Page (md)</que-breadcrumb-item>
      </que-breadcrumb>
      <que-breadcrumb size="lg">
        <que-breadcrumb-item href="#">Home</que-breadcrumb-item>
        <que-breadcrumb-item href="#">Section</que-breadcrumb-item>
        <que-breadcrumb-item>Page (lg)</que-breadcrumb-item>
      </que-breadcrumb>
    </div>
  </main>

  <script type="module">
    import { applyTheme, createTheme } from '../dist/theme.js'
    import '../dist/button.js'
    import '../dist/breadcrumb.js'

    const ctrl = applyTheme(createTheme())
    const toggle = document.getElementById('theme-toggle')
    if (toggle) {
      toggle.addEventListener('change', e => ctrl.setMode(e.target.value))
      const sync = () => { const i = toggle.querySelector(`input[value="${ctrl.mode}"]`); if (i) i.checked = true }
      ctrl.onChange(sync)
      sync()
    }
  </script>
</body>
</html>
