<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>que-ui — Button (CSS)</title>
  <link rel="stylesheet" href="../dist/tokens.css" />
  <link rel="stylesheet" href="../dist/button.css" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <header>
    <span class="logo">que-ui</span>
    <nav>
      <a href="index.html" class="que-button que-button--ghost que-button--sm">CSS</a>
      <a href="index-js.html" class="que-button que-button--ghost que-button--sm">JS</a>
      <a href="all.html" class="que-button que-button--ghost que-button--sm">All pages</a>
    </nav>
    <div class="theme-toggle">
      <button data-mode="light" class="active">Light</button>
      <button data-mode="dark">Dark</button>
      <button data-mode="system">System</button>
    </div>
  </header>

  <main>
    <h2>Variants × Intents</h2>
    <div class="row">
      <button class="que-button que-button--intent-primary">Primary</button>
      <button class="que-button que-button--intent-secondary">Secondary</button>
      <button class="que-button que-button--intent-danger">Danger</button>
      <button class="que-button que-button--intent-success">Success</button>
      <button class="que-button que-button--intent-warning">Warning</button>
    </div>
    <div class="row">
      <button class="que-button que-button--outline que-button--intent-primary">Primary</button>
      <button class="que-button que-button--outline que-button--intent-secondary">Secondary</button>
      <button class="que-button que-button--outline que-button--intent-danger">Danger</button>
      <button class="que-button que-button--outline que-button--intent-success">Success</button>
      <button class="que-button que-button--outline que-button--intent-warning">Warning</button>
    </div>
    <div class="row">
      <button class="que-button que-button--ghost que-button--intent-primary">Primary</button>
      <button class="que-button que-button--ghost que-button--intent-secondary">Secondary</button>
      <button class="que-button que-button--ghost que-button--intent-danger">Danger</button>
      <button class="que-button que-button--ghost que-button--intent-success">Success</button>
      <button class="que-button que-button--ghost que-button--intent-warning">Warning</button>
    </div>

    <h2>Sizes</h2>
    <div class="row">
      <button class="que-button que-button--sm">Small</button>
      <button class="que-button">Medium</button>
      <button class="que-button que-button--lg">Large</button>
    </div>

    <h2>Disabled</h2>
    <div class="row">
      <button class="que-button" disabled>Solid</button>
      <button class="que-button que-button--outline" disabled>Outline</button>
      <button class="que-button que-button--ghost" disabled>Ghost</button>
      <button class="que-button que-button--intent-danger" disabled>Danger</button>
      <button class="que-button que-button--outline que-button--intent-danger" disabled>Danger outline</button>
    </div>

    <h2>Full width</h2>
    <div style="max-width: 400px;">
      <button class="que-button que-button--full">Full width button</button>
    </div>

    <h2>As anchor</h2>
    <div class="row">
      <a href="#" class="que-button">Link button</a>
      <a href="#" class="que-button que-button--outline">Outline link</a>
      <a href="#" target="_blank" class="que-button">Opens in new tab</a>
    </div>

    <h2>Custom padding &amp; font size</h2>
    <div class="row">
      <button class="que-button" style="--que-button-padding-x: 32px; --que-button-padding-y: 12px;">Tall &amp; wide</button>
      <button class="que-button" style="--que-button-font-size: 18px; --que-button-padding-x: 24px;">Bigger text</button>
      <button class="que-button" style="--que-button-radius: var(--que-radius-full);">Pill shape</button>
    </div>
  </main>

  <script src="shared.js"></script>
</body>
</html>
