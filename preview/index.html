<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>que-ui preview</title>
  <style>
    body {
      font-family: var(--que-font-sans);
      background: var(--que-color-bg);
      color: var(--que-color-text);
      padding: 40px;
      max-width: 800px;
      margin: 0 auto;
    }

    h1 { font-size: var(--que-font-size-2xl); margin-bottom: 32px; }
    h2 { font-size: var(--que-font-size-sm); font-weight: var(--que-font-weight-semibold);
         color: var(--que-color-text-subtle); text-transform: uppercase;
         letter-spacing: var(--que-letter-spacing-wider); margin: 32px 0 12px; }

    .swatches { display: flex; flex-wrap: wrap; gap: 8px; }
    .swatch {
      width: 80px;
      border-radius: var(--que-radius-md);
      overflow: hidden;
      border: 1px solid var(--que-color-border);
      font-size: 10px;
      font-family: var(--que-font-mono);
    }
    .swatch-color { height: 40px; }
    .swatch-label { padding: 4px 6px; color: var(--que-color-text-muted); background: var(--que-color-surface); }

    .toggle {
      display: inline-flex; gap: 4px; padding: 4px;
      background: var(--que-color-bg-muted); border-radius: var(--que-radius-full);
      margin-bottom: 32px;
    }
    .toggle button {
      background: none; border: none; cursor: pointer;
      padding: 6px 14px; border-radius: var(--que-radius-full);
      font-size: var(--que-font-size-sm); color: var(--que-color-text-muted);
    }
    .toggle button.active {
      background: var(--que-color-surface); color: var(--que-color-text);
      box-shadow: var(--que-shadow-sm);
    }
  </style>
</head>
<body>
  <h1>que-ui</h1>

  <div class="toggle">
    <button data-mode="light" class="active">Light</button>
    <button data-mode="dark">Dark</button>
    <button data-mode="system">System</button>
  </div>

  <h2>Colors</h2>
  <div class="swatches">
    <div class="swatch"><div class="swatch-color" style="background:var(--que-color-primary)"></div><div class="swatch-label">primary</div></div>
    <div class="swatch"><div class="swatch-color" style="background:var(--que-color-secondary)"></div><div class="swatch-label">secondary</div></div>
    <div class="swatch"><div class="swatch-color" style="background:var(--que-color-bg)"></div><div class="swatch-label">bg</div></div>
    <div class="swatch"><div class="swatch-color" style="background:var(--que-color-surface)"></div><div class="swatch-label">surface</div></div>
    <div class="swatch"><div class="swatch-color" style="background:var(--que-color-text)"></div><div class="swatch-label">text</div></div>
    <div class="swatch"><div class="swatch-color" style="background:var(--que-color-border)"></div><div class="swatch-label">border</div></div>
    <div class="swatch"><div class="swatch-color" style="background:var(--que-color-success)"></div><div class="swatch-label">success</div></div>
    <div class="swatch"><div class="swatch-color" style="background:var(--que-color-warning)"></div><div class="swatch-label">warning</div></div>
    <div class="swatch"><div class="swatch-color" style="background:var(--que-color-danger)"></div><div class="swatch-label">danger</div></div>
  </div>

  <h2>Typography</h2>
  <div style="display:flex;flex-direction:column;gap:8px">
    <span style="font-size:var(--que-font-size-xs)">xs — The quick brown fox</span>
    <span style="font-size:var(--que-font-size-sm)">sm — The quick brown fox</span>
    <span style="font-size:var(--que-font-size-md)">md — The quick brown fox</span>
    <span style="font-size:var(--que-font-size-lg)">lg — The quick brown fox</span>
    <span style="font-size:var(--que-font-size-xl)">xl — The quick brown fox</span>
    <span style="font-size:var(--que-font-size-2xl)">2xl — The quick brown fox</span>
  </div>

  <h2>Spacing / Radius / Shadow</h2>
  <div style="display:flex;gap:var(--que-space-4);align-items:flex-end;flex-wrap:wrap">
    <div style="width:var(--que-space-4);height:var(--que-space-4);background:var(--que-color-primary);opacity:.5"></div>
    <div style="width:var(--que-space-8);height:var(--que-space-8);background:var(--que-color-primary);opacity:.6;border-radius:var(--que-radius-sm)"></div>
    <div style="width:var(--que-space-12);height:var(--que-space-12);background:var(--que-color-primary);opacity:.7;border-radius:var(--que-radius-md)"></div>
    <div style="width:var(--que-space-16);height:var(--que-space-16);background:var(--que-color-primary);opacity:.8;border-radius:var(--que-radius-lg)"></div>
    <div style="width:var(--que-space-16);height:var(--que-space-16);background:var(--que-color-surface);box-shadow:var(--que-shadow-md);border-radius:var(--que-radius-xl)"></div>
    <div style="width:var(--que-space-16);height:var(--que-space-16);background:var(--que-color-surface);box-shadow:var(--que-shadow-lg);border-radius:var(--que-radius-2xl)"></div>
  </div>

  <script>
    document.querySelectorAll('.toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.toggle button').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        document.documentElement.setAttribute('data-theme', btn.dataset.mode)
      })
    })
  </script>
</body>
</html>
