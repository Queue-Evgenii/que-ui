<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>que-ui — Navbar (CSS)</title>
  <link rel="stylesheet" href="../dist/tokens.css" />
  <link rel="stylesheet" href="../dist/button.css" />
  <link rel="stylesheet" href="../dist/navbar.css" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .demo-frame {
      border: 1px solid var(--que-color-border);
      border-radius: var(--que-radius-lg);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .demo-body {
      padding: 24px;
      height: 80px;
      background: var(--que-color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--que-font-size-sm);
      color: var(--que-color-text-muted);
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">que-ui</span>
    <nav>
      <a href="index.html" class="que-button que-button--ghost que-button--sm">CSS</a>
      <a href="index-js.html" class="que-button que-button--ghost que-button--sm">JS</a>
      <a href="all.html"       class="que-button que-button--ghost que-button--sm">All pages</a>
    </nav>
    <div class="theme-toggle">
      <div class="que-segmented que-segmented--pill" id="theme-toggle">
        <label class="que-segmented__item"><input class="que-segmented__input" type="radio" name="theme" value="light" checked /><span class="que-segmented__label">Light</span></label>
        <label class="que-segmented__item"><input class="que-segmented__input" type="radio" name="theme" value="dark" /><span class="que-segmented__label">Dark</span></label>
        <label class="que-segmented__item"><input class="que-segmented__input" type="radio" name="theme" value="system" /><span class="que-segmented__label">System</span></label>
      </div>
    </div>
  </header>

  <main>
    <h2>Solid (default)</h2>
    <div class="demo-frame">
      <nav class="que-navbar" role="banner">
        <a href="#" class="que-navbar__brand">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--que-color-primary)" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          que-ui
        </a>
        <div class="que-navbar__section">
          <a href="#" class="que-button que-button--ghost que-button--sm">Home</a>
          <a href="#" class="que-button que-button--ghost que-button--sm">Docs</a>
          <a href="#" class="que-button que-button--ghost que-button--sm">Components</a>
        </div>
        <div class="que-navbar__section que-navbar__section--end">
          <a href="#" class="que-button que-button--outline que-button--sm">Log in</a>
          <a href="#" class="que-button que-button--sm">Sign up</a>
        </div>
      </nav>
      <div class="demo-body">Page content</div>
    </div>

    <h2>Blur variant</h2>
    <div class="demo-frame">
      <nav class="que-navbar que-navbar--blur" role="banner">
        <a href="#" class="que-navbar__brand">AppName</a>
        <div class="que-navbar__section que-navbar__section--end">
          <a href="#" class="que-button que-button--ghost que-button--sm">Settings</a>
          <a href="#" class="que-button que-button--sm">Dashboard</a>
        </div>
      </nav>
      <div class="demo-body" style="background:linear-gradient(135deg,var(--que-color-primary-subtle),var(--que-color-bg-subtle));">Background content</div>
    </div>

    <h2>Transparent variant</h2>
    <div class="demo-frame">
      <div style="background:linear-gradient(135deg,var(--que-color-primary),var(--que-color-primary-hover));">
        <nav class="que-navbar que-navbar--transparent" role="banner" style="--que-color-text:white;--que-color-border:rgba(255,255,255,0.15);">
          <span class="que-navbar__brand" style="color:white;">Brand</span>
          <div class="que-navbar__section que-navbar__section--end">
            <a href="#" class="que-button que-button--outline que-button--sm" style="color:white;border-color:rgba(255,255,255,0.5);">Menu</a>
          </div>
        </nav>
        <div class="demo-body" style="background:transparent;color:white;">Hero section</div>
      </div>
    </div>

    <h2>Custom height</h2>
    <div class="demo-frame">
      <nav class="que-navbar" role="banner" style="--que-navbar-height:44px;">
        <span class="que-navbar__brand">Compact nav</span>
        <div class="que-navbar__section que-navbar__section--end">
          <a href="#" class="que-button que-button--ghost que-button--sm">Link</a>
        </div>
      </nav>
    </div>
  </main>

  <script src="shared.js"></script>
</body>
</html>
