<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>que-ui — Progress Circle (CSS)</title>
  <link rel="stylesheet" href="../dist/tokens.css" />
  <link rel="stylesheet" href="../dist/button.css" />
  <link rel="stylesheet" href="../dist/progress.css" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <header>
    <span class="logo">que-ui</span>
    <nav>
      <a href="progress-circle.html" class="que-button que-button--ghost que-button--sm">CSS</a>
      <a href="progress-circle-js.html" class="que-button que-button--ghost que-button--sm">JS</a>
      <a href="all.html" class="que-button que-button--ghost que-button--sm">All pages</a>
    </nav>
    <div class="theme-toggle">
      <div class="que-segmented que-segmented--pill" id="theme-toggle">
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="light" checked />
          <span class="que-segmented__label">Light</span>
        </label>
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="dark" />
          <span class="que-segmented__label">Dark</span>
        </label>
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="system" />
          <span class="que-segmented__label">System</span>
        </label>
      </div>
    </div>
  </header>

  <main>
    <h2>Values</h2>
    <div class="row" style="align-items: center; gap: 16px;">
      <div class="que-progress que-progress--circular" role="progressbar" aria-valuenow="0"   aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:100"/></svg>
      </div>
      <div class="que-progress que-progress--circular" role="progressbar" aria-valuenow="25"  aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:75"/></svg>
      </div>
      <div class="que-progress que-progress--circular" role="progressbar" aria-valuenow="60"  aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:40"/></svg>
      </div>
      <div class="que-progress que-progress--circular" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:0"/></svg>
      </div>
    </div>

    <h2>Intents</h2>
    <div class="row" style="align-items: center; gap: 16px;">
      <div class="que-progress que-progress--circular que-progress--intent-primary"   role="progressbar" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:30"/></svg>
      </div>
      <div class="que-progress que-progress--circular que-progress--intent-secondary" role="progressbar" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:30"/></svg>
      </div>
      <div class="que-progress que-progress--circular que-progress--intent-success"   role="progressbar" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:30"/></svg>
      </div>
      <div class="que-progress que-progress--circular que-progress--intent-warning"   role="progressbar" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:30"/></svg>
      </div>
      <div class="que-progress que-progress--circular que-progress--intent-danger"    role="progressbar" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:30"/></svg>
      </div>
      <div class="que-progress que-progress--circular que-progress--intent-neutral"   role="progressbar" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:30"/></svg>
      </div>
    </div>

    <h2>Sizes</h2>
    <div class="row" style="align-items: center; gap: 16px;">
      <div class="que-progress que-progress--circular que-progress--sm" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:40"/></svg>
      </div>
      <div class="que-progress que-progress--circular" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:40"/></svg>
      </div>
      <div class="que-progress que-progress--circular que-progress--lg" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:40"/></svg>
      </div>
      <div class="que-progress que-progress--circular que-progress--xl" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:40"/></svg>
      </div>
    </div>

    <h2>Indeterminate</h2>
    <div class="row" style="align-items: center; gap: 16px;">
      <div class="que-progress que-progress--circular que-progress--indeterminate" role="progressbar" aria-label="Loading">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9"/></svg>
      </div>
      <div class="que-progress que-progress--circular que-progress--indeterminate que-progress--intent-success que-progress--lg" role="progressbar" aria-label="Loading">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9"/></svg>
      </div>
    </div>

    <h2>Custom</h2>
    <div class="row" style="align-items: center; gap: 16px;">
      <div class="que-progress que-progress--circular" role="progressbar" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100" style="--que-progress-color: hotpink; --que-progress-size: 56px;">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:55"/></svg>
      </div>
      <div class="que-progress que-progress--circular" role="progressbar" aria-valuenow="80" aria-valuemin="0" aria-valuemax="100" style="--que-progress-color: var(--que-color-success); --que-progress-thickness: 6; --que-progress-size: 72px;">
        <svg viewBox="0 0 36 36" fill="none" aria-hidden="true"><circle class="que-progress__track" cx="18" cy="18" r="15.9"/><circle class="que-progress__fill" cx="18" cy="18" r="15.9" style="stroke-dashoffset:20"/></svg>
      </div>
    </div>
  </main>

  <script src="shared.js"></script>
</body>
</html>
