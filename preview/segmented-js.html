<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>que-ui — Segmented (JS)</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <header>
    <span class="logo">que-ui</span>
    <nav>
      <que-button href="index.html" variant="ghost" size="sm">CSS</que-button>
      <que-button href="index-js.html" variant="ghost" size="sm">JS</que-button>
      <que-button href="all.html" variant="ghost" size="sm">All pages</que-button>
    </nav>
    <div class="theme-toggle">
      <div class="que-segmented que-segmented--pill" id="theme-toggle">
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="light" checked />
          <span class="que-segmented__label">Light</span>
        </label>
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="dark" />
          <span class="que-segmented__label">Dark</span>
        </label>
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="system" />
          <span class="que-segmented__label">System</span>
        </label>
      </div>
    </div>
  </header>

  <main style="max-width: 480px;">
    <h2>Default</h2>
    <que-segmented name="view" value="list">
      <que-segment value="list">List</que-segment>
      <que-segment value="grid">Grid</que-segment>
      <que-segment value="table">Table</que-segment>
    </que-segmented>

    <h2>Theme toggle</h2>
    <que-segmented id="theme-seg" name="theme2" value="light">
      <que-segment value="light">Light</que-segment>
      <que-segment value="dark">Dark</que-segment>
      <que-segment value="system">System</que-segment>
    </que-segmented>

    <h2>Shapes</h2>
    <div class="col">
      <que-segmented name="s1" value="a" shape="pill">
        <que-segment value="a">Pill</que-segment>
        <que-segment value="b">Default</que-segment>
        <que-segment value="c">Shape</que-segment>
      </que-segmented>
      <que-segmented name="s2" value="a" shape="rounded">
        <que-segment value="a">Rounded</que-segment>
        <que-segment value="b">Default</que-segment>
        <que-segment value="c">Shape</que-segment>
      </que-segmented>
      <que-segmented name="s3" value="a" shape="square">
        <que-segment value="a">Square</que-segment>
        <que-segment value="b">Default</que-segment>
        <que-segment value="c">Shape</que-segment>
      </que-segmented>
    </div>

    <h2>With disabled option</h2>
    <que-segmented name="period" value="day">
      <que-segment value="day">Day</que-segment>
      <que-segment value="week">Week</que-segment>
      <que-segment value="month">Month</que-segment>
      <que-segment value="year" disabled>Year</que-segment>
    </que-segmented>

    <h2>Events</h2>
    <que-segmented id="live-seg" name="live" value="a">
      <que-segment value="a">Option A</que-segment>
      <que-segment value="b">Option B</que-segment>
      <que-segment value="c">Option C</que-segment>
    </que-segmented>
    <p id="event-log" style="font-family: var(--que-font-mono); font-size: var(--que-font-size-xs); color: var(--que-color-text-muted); margin-top: 8px;">—</p>
  </main>

  <script type="module">
    import { applyTheme, createTheme } from '../dist/theme.js'
    import '../dist/button.js'
    import '../dist/segmented.js'

    const ctrl = applyTheme(createTheme())

    const toggle = document.getElementById('theme-toggle')
    if (toggle) {
      toggle.addEventListener('change', e => ctrl.setMode(e.target.value))
      const sync = () => { const i = toggle.querySelector(`input[value="${ctrl.mode}"]`); if (i) i.checked = true }
      ctrl.onChange(sync)
      sync()
    }

    // Wire theme-seg to actually switch theme
    document.getElementById('theme-seg').addEventListener('que-change', e => {
      ctrl.setMode(e.detail.value)
    })

    const log = document.getElementById('event-log')
    document.getElementById('live-seg').addEventListener('que-change', e => {
      log.textContent = `que-change → value: "${e.detail.value}"`
    })
  </script>
</body>
</html>
