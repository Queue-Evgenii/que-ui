<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>que-ui — Switch (JS)</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <header>
    <span class="logo">que-ui</span>
    <nav>
      <que-button href="index.html" variant="ghost" size="sm">CSS</que-button>
      <que-button href="index-js.html" variant="ghost" size="sm">JS</que-button>
      <que-button href="all.html" variant="ghost" size="sm">All pages</que-button>
    </nav>
    <div class="theme-toggle">
      <div class="que-segmented que-segmented--pill" id="theme-toggle">
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="light" checked />
          <span class="que-segmented__label">Light</span>
        </label>
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="dark" />
          <span class="que-segmented__label">Dark</span>
        </label>
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="system" />
          <span class="que-segmented__label">System</span>
        </label>
      </div>
    </div>
  </header>

  <main style="max-width: 480px;">
    <h2>Default (label right)</h2>
    <div class="col">
      <que-switch label="Off"></que-switch>
      <que-switch label="On" checked></que-switch>
    </div>

    <h2>Label left</h2>
    <div class="col">
      <que-switch label="Notifications" direction="ltr"></que-switch>
      <que-switch label="Dark mode" direction="ltr" checked></que-switch>
    </div>

    <h2>With hint</h2>
    <div class="col">
      <que-switch label="Email notifications" direction="ltr" hint="Receive updates via email" checked></que-switch>
    </div>

    <h2>Intents</h2>
    <div class="col">
      <que-switch label="Enable 2FA" intent="danger" error="This setting is required"></que-switch>
      <que-switch label="Warning state" intent="warning" checked></que-switch>
    </div>

    <h2>Disabled</h2>
    <div class="col">
      <que-switch label="Disabled off" disabled></que-switch>
      <que-switch label="Disabled on" disabled checked></que-switch>
    </div>

    <h2>Events</h2>
    <que-switch id="live-switch" label="Toggle me"></que-switch>
    <p id="event-log" style="font-family: var(--que-font-mono); font-size: var(--que-font-size-xs); color: var(--que-color-text-muted); margin-top: 8px;">—</p>
  </main>

  <style>
    .col { display: flex; flex-direction: column; gap: 12px; }
  </style>

  <script type="module">
    import { applyTheme, createTheme } from '../dist/theme.js'
    import '../dist/button.js'
    import '../dist/switch.js'

    const ctrl = applyTheme(createTheme())

    const toggle = document.getElementById('theme-toggle')
    if (toggle) {
      toggle.addEventListener('change', e => ctrl.setMode(e.target.value))
      const sync = () => { const i = toggle.querySelector(`input[value="${ctrl.mode}"]`); if (i) i.checked = true }
      ctrl.onChange(sync)
      sync()
    }

    const log = document.getElementById('event-log')
    document.getElementById('live-switch').addEventListener('que-change', e => {
      log.textContent = `que-change → checked: ${e.detail.checked}`
    })
  </script>
</body>
</html>
