<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>que-ui — Theme (JS)</title>
  <link rel="stylesheet" href="../dist/utilities.css" />
  <link rel="stylesheet" href="shared.css" />
  <!-- tokens.css not needed — applyTheme() injects all CSS vars -->
</head>
<body>
  <header>
    <span class="logo">que-ui</span>
    <nav>
      <que-button href="index.html" variant="ghost" size="sm">CSS</que-button>
      <que-button href="index-js.html" variant="ghost" size="sm">JS</que-button>
      <que-button href="all.html" variant="ghost" size="sm">All pages</que-button>
    </nav>
    <div class="theme-toggle">
      <button data-mode="light">Light</button>
      <button data-mode="dark">Dark</button>
      <button data-mode="system">System</button>
    </div>
  </header>

  <main>
    <h2>Colors</h2>
    <div class="swatches">
      <div class="swatch"><div class="swatch-color bg-primary"></div><div class="swatch-label">primary</div></div>
      <div class="swatch"><div class="swatch-color bg-secondary"></div><div class="swatch-label">secondary</div></div>
      <div class="swatch"><div class="swatch-color bg-bg"></div><div class="swatch-label">bg</div></div>
      <div class="swatch"><div class="swatch-color bg-surface"></div><div class="swatch-label">surface</div></div>
      <div class="swatch"><div class="swatch-color bg-text"></div><div class="swatch-label">text</div></div>
      <div class="swatch"><div class="swatch-color bg-border"></div><div class="swatch-label">border</div></div>
      <div class="swatch"><div class="swatch-color bg-success"></div><div class="swatch-label">success</div></div>
      <div class="swatch"><div class="swatch-color bg-warning"></div><div class="swatch-label">warning</div></div>
      <div class="swatch"><div class="swatch-color bg-danger"></div><div class="swatch-label">danger</div></div>
    </div>

    <h2>Typography</h2>
    <div class="type-stack">
      <span style="font-size:var(--que-font-size-xs)">xs — The quick brown fox</span>
      <span style="font-size:var(--que-font-size-sm)">sm — The quick brown fox</span>
      <span style="font-size:var(--que-font-size-md)">md — The quick brown fox</span>
      <span style="font-size:var(--que-font-size-lg)">lg — The quick brown fox</span>
      <span style="font-size:var(--que-font-size-xl)">xl — The quick brown fox</span>
      <span style="font-size:var(--que-font-size-2xl)">2xl — The quick brown fox</span>
    </div>

    <h2>ThemeController</h2>
    <div class="row" style="gap:8px">
      <code id="mode-display" style="font-family:var(--que-font-mono);font-size:var(--que-font-size-sm);color:var(--que-color-text-muted)">mode: light</code>
    </div>
  </main>

  <script type="module">
    import { applyTheme, createTheme } from '../dist/theme.js'
    import '../dist/button.js'

    const ctrl = applyTheme(createTheme())

    // Wire up the toggle buttons
    document.querySelectorAll('.theme-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-toggle button').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        ctrl.setMode(btn.dataset.mode)
      })
    })

    // Show resolved mode
    const display = document.getElementById('mode-display')
    const update = () => {
      display.textContent = `mode: ${ctrl.mode} → resolved: ${ctrl.resolvedMode}`
      document.querySelectorAll('.theme-toggle button').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === ctrl.mode)
      })
    }
    ctrl.onChange(update)
    update()
  </script>
</body>
</html>
