<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>que-ui — Toast (CSS)</title>
  <link rel="stylesheet" href="../dist/tokens.css" />
  <link rel="stylesheet" href="../dist/button.css" />
  <link rel="stylesheet" href="../dist/toast.css" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .demo-toaster {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">que-ui</span>
    <nav>
      <a href="toast.html" class="que-button que-button--ghost que-button--sm">CSS</a>
      <a href="toast-js.html" class="que-button que-button--ghost que-button--sm">JS</a>
      <a href="all.html" class="que-button que-button--ghost que-button--sm">All pages</a>
    </nav>
    <div class="theme-toggle">
      <div class="que-segmented que-segmented--pill" id="theme-toggle">
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="light" checked />
          <span class="que-segmented__label">Light</span>
        </label>
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="dark" />
          <span class="que-segmented__label">Dark</span>
        </label>
        <label class="que-segmented__item">
          <input class="que-segmented__input" type="radio" name="theme" value="system" />
          <span class="que-segmented__label">System</span>
        </label>
      </div>
    </div>
  </header>

  <main>
    <h2>Intents</h2>
    <div class="demo-toaster">
      <div class="que-toast que-toast--intent-info" role="status">
        <span class="que-toast__icon"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-7-4a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM9 9a.75.75 0 0 0 0 1.5h.253a.25.25 0 0 1 .244.304l-.459 2.066A1.75 1.75 0 0 0 10.747 15H11a.75.75 0 0 0 0-1.5h-.253a.25.25 0 0 1-.244-.304l.459-2.066A1.75 1.75 0 0 0 9.253 9H9Z" clip-rule="evenodd"/></svg></span>
        <span class="que-toast__body"><strong class="que-toast__title">Info</strong><span class="que-toast__desc">This is an informational message.</span></span>
        <button class="que-toast__close" aria-label="Dismiss">&#x2715;</button>
      </div>
      <div class="que-toast que-toast--intent-success" role="status">
        <span class="que-toast__icon"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd"/></svg></span>
        <span class="que-toast__body"><strong class="que-toast__title">Saved!</strong><span class="que-toast__desc">Your changes have been saved successfully.</span></span>
        <button class="que-toast__close" aria-label="Dismiss">&#x2715;</button>
      </div>
      <div class="que-toast que-toast--intent-warning" role="status">
        <span class="que-toast__icon"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495ZM10 5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 5Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"/></svg></span>
        <span class="que-toast__body"><strong class="que-toast__title">Low storage</strong><span class="que-toast__desc">You are running out of storage space.</span></span>
        <button class="que-toast__close" aria-label="Dismiss">&#x2715;</button>
      </div>
      <div class="que-toast que-toast--intent-danger" role="status">
        <span class="que-toast__icon"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94 8.28 7.22Z" clip-rule="evenodd"/></svg></span>
        <span class="que-toast__body"><strong class="que-toast__title">Upload failed</strong><span class="que-toast__desc">Something went wrong. Please try again.</span></span>
        <button class="que-toast__close" aria-label="Dismiss">&#x2715;</button>
      </div>
    </div>

    <h2>Title only</h2>
    <div class="demo-toaster">
      <div class="que-toast que-toast--intent-success" role="status">
        <span class="que-toast__icon"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd"/></svg></span>
        <span class="que-toast__body"><strong class="que-toast__title">File uploaded successfully</strong></span>
        <button class="que-toast__close" aria-label="Dismiss">&#x2715;</button>
      </div>
    </div>
  </main>

  <script src="shared.js"></script>
</body>
</html>
